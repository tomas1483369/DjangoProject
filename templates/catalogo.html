{% extends 'base.html' %}

{% block title %}Catálogo{% endblock %}

{% block content %}
<div class="row gy-4 mb-4 align-items-center">
    <div class="col">
        <div>
            <h1 class="h4 mb-1">Catálogo</h1>
            <p class="text-muted">Productos estilo marketplace.</p>
        </div>
    </div>
    <div class="col-auto">
        <a href="{% url 'productos:crear_producto' %}" class="submit">Nuevo producto</a>
    </div>
</div>
<div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4">
    {% if products %}
        {% include 'productos/catalogo_cards.html' %}
    {% else %}
        <div class="col-12">
            <div class="alert alert-info" role="alert">
                No hay productos disponibles. El catálogo está vacío.
            </div>
        </div>
    {% endif %}
</div>
{% endblock %}
