{% extends 'base.html' %}

{% block title %}Iniciar sesión{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-10 col-lg-6">
        <div class="form">
            <p class="title">Sign in</p>
            <p class="message">Enter your credentials to continue.</p>
            <form method="post" novalidate>
                {% csrf_token %}
                {% if form.errors %}
                    <div class="alert alert-danger" role="alert">
                        Usuario o contraseña incorrectos.
                    </div>
                {% endif %}
                <label>
                    <input class="input" type="text" name="username" autofocus maxlength="150" placeholder=" " required>
                    <span>Usuario</span>
                </label>
                <label>
                    <input class="input" type="password" name="password" placeholder=" " required>
                    <span>Contraseña</span>
                </label>
                <button class="submit" type="submit">Ingresar</button>
                <p class="signin">¿No tienes cuenta? <a href="{% url 'usuarios:register' %}">Registrarse</a></p>
            </form>
        </div>
    </div>
</div>
{% endblock %}
