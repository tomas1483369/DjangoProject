{% extends 'base.html' %}

{% block title %}Iniciar sesión{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-secondary bg-dark text-white shadow-sm">
            <div class="card-body">
                <h2 class="card-title mb-3">Iniciar sesión</h2>
                <form method="post" novalidate>
                    {% csrf_token %}
                    {% if form.errors %}
                        <div class="alert alert-danger" role="alert">
                            Usuario o contraseña incorrectos.
                        </div>
                    {% endif %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label">Usuario</label>
                        <input type="text" name="username" autofocus maxlength="150" class="form-control bg-secondary text-white border-secondary" id="id_username" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_password" class="form-label">Contraseña</label>
                        <input type="password" name="password" class="form-control bg-secondary text-white border-secondary" id="id_password" required>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <button class="btn btn-primary" type="submit">Ingresar</button>
                        <a href="{% url 'productos:catalogo' %}" class="link-light">Ver catálogo</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
