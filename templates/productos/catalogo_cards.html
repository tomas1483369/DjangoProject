{% for product in products %}
<div class="col">
    <a href="{% url 'productos:producto_detalle' product.pk %}" class="marketplace-card-link">
        <div class="card h-100 border-secondary bg-dark text-white shadow-sm marketplace-card {% if product.is_out_of_stock %}out-stock{% elif product.is_low_stock %}low-stock{% endif %}">
            <div class="marketplace-thumb position-relative">
                {% if product.imagen %}
                    <img src="{{ product.imagen.url }}" class="marketplace-image" alt="{{ product.nombre }}">
                {% else %}
                    <div class="marketplace-placeholder">
                        <span class="marketplace-icon">📦</span>
                    </div>
                {% endif %}
                <div class="d-flex justify-content-between align-items-start p-3 position-absolute top-0 start-0 end-0">
                    <span class="marketplace-tag badge bg-dark bg-opacity-75 text-white">{{ product.codigo }}</span>
                    <span class="{{ product.stock_badge_class }}">{{ product.stock_badge }}</span>
                </div>
            </div>
            <div class="card-body marketplace-body">
                <div>
                    <h5 class="card-title mb-2">{{ product.nombre }}</h5>
                    <p class="card-text text-muted mb-3">{{ product.descripcion|truncatechars:100 }}</p>
                </div>
                <div class="marketplace-meta">
                    <div>
                        <p class="text-muted small mb-1">Precio</p>
                        <p class="h5 mb-0">${{ product.precio }}</p>
                    </div>
                    <div class="text-end">
                        <p class="text-muted small mb-1">Stock</p>
                        <p class="mb-0">{{ product.cantidad }}</p>
                    </div>
                </div>
            </div>
        </div>
    </a>
</div>
{% endfor %}
