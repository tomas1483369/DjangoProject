{% extends 'base.html' %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<div class="row g-4">
    <div class="col-12">
        <div class="card p-4 shadow-sm border-secondary bg-dark text-white">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="h4">Dashboard</h1>
                    <p class="text-muted">Resumen inicial del sistema.</p>
                </div>
                <div>
                    <span class="badge bg-primary">Modo académico</span>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card p-3 border-secondary bg-dark text-white h-100">
            <h2 class="h5">Usuarios</h2>
            <p class="display-6">{{ total_users }}</p>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card p-3 border-secondary bg-dark text-white h-100">
            <h2 class="h5">Productos</h2>
            <p class="display-6">{{ total_products }}</p>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card p-3 border-secondary bg-dark text-white h-100">
            <h2 class="h5">Bajo stock</h2>
            <p class="display-6">{{ low_stock_products }}</p>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card p-3 border-secondary bg-dark text-white h-100">
            <h2 class="h5">Agotados</h2>
            <p class="display-6">{{ out_of_stock_products }}</p>
        </div>
    </div>
</div>
{% endblock %}
